<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 升级版扫雷 - Minesweeper Deluxe</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --cell-unrevealed: #3a3f5c;
            --cell-unrevealed-top: #4e5578;
            --cell-unrevealed-bottom: #2a2e42;
            --cell-revealed: #1e2338;
            --cell-hover: #5b6388;
            --text-light: #e0e0e0;
            --text-muted: #a0a0b8;
            --gold: #f0c060;
            --accent: #ff6b6b;
            --accent2: #4ecdc4;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --flag-color: #ff6b6b;
            --mine-color: #2c2c2c;
            --cell-size: 38px;
            --gap: 2px;
            --border-radius: 6px;
            --transition-speed: 0.15s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #1a1a2e 30%, #16213e 60%, #0f0c29);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 背景星星粒子 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.15;
                transform: scale(0.8);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.4);
            }
        }

        .game-wrapper {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px 20px 20px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            max-width: 95vw;
            transition: box-shadow 0.4s;
        }
        .game-wrapper.victory-glow {
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(78, 205, 196, 0.35),
                0 0 160px rgba(78, 205, 196, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.08);
        }
        .game-wrapper.defeat-glow {
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(255, 71, 87, 0.4),
                0 0 160px rgba(255, 71, 87, 0.18),
                0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .game-title {
            font-size: 1.6em;
            font-weight: 700;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #f0c060, #ff9a56, #f0c060);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin: 0;
        }

        /* 难度选择器 */
        .difficulty-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .diff-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.88em;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: all 0.25s;
            white-space: nowrap;
            font-family: inherit;
        }
        .diff-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: translateY(-1px);
        }
        .diff-btn.active {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #0f0c29;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.35);
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
        }
        .status-display {
            background: #0d1117;
            border-radius: 10px;
            padding: 8px 14px;
            font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
            font-size: 1.3em;
            font-weight: 700;
            color: #ff6b6b;
            letter-spacing: 0.06em;
            min-width: 55px;
            text-align: center;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: color 0.3s;
        }
        .status-display.timer {
            color: #4ecdc4;
        }
        .face-btn {
            font-size: 2em;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 10px;
            border-radius: 50%;
            transition: all 0.2s;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        .face-btn:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5)) brightness(1.2);
        }
        .face-btn:active {
            transform: scale(0.9);
        }
        .face-btn.pressed {
            animation: faceWobble 0.3s ease;
        }
        @keyframes faceWobble {
            0%,
            100% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.25);
            }
            60% {
                transform: scale(0.85);
            }
        }

        /* 游戏网格容器 */
        .grid-container {
            background: #0d1117;
            border-radius: 12px;
            padding: 6px;
            box-shadow:
                inset 0 4px 12px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .game-grid {
            display: grid;
            gap: var(--gap);
            position: relative;
            z-index: 2;
        }

        /* 单元格 */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border-radius: var(--border-radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95em;
            transition: all var(--transition-speed) ease;
            position: relative;
            border: none;
            outline: none;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .cell.unrevealed {
            background: linear-gradient(145deg, var(--cell-unrevealed-top) 0%, var(--cell-unrevealed) 40%, var(--cell-unrevealed-bottom) 100%);
            box-shadow:
                2px 2px 4px rgba(0, 0, 0, 0.35),
                -1px -1px 2px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }
        .cell.unrevealed:hover {
            background: linear-gradient(145deg, #5b6388 0%, #4a5070 40%, #3a3f5c 100%);
            box-shadow:
                2px 2px 6px rgba(0, 0, 0, 0.4),
                -1px -1px 3px rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }
        .cell.unrevealed:active {
            transform: scale(0.93);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.5);
            transition: all 0.05s ease;
        }
        .cell.revealed {
            background: var(--cell-revealed);
            box-shadow: inset 2px 2px 6px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.35);
            cursor: default;
            animation: cellReveal 0.2s ease-out;
        }
        .cell.revealed:hover {
            background: #232840;
        }
        .cell.mine-exploded {
            background: #ff4757 !important;
            animation: explodeCell 0.5s ease-out;
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.8) !important;
            z-index: 3;
        }
        .cell.flagged {
            animation: flagPlant 0.25s ease-out;
        }
        .cell.chord-flash {
            animation: chordFlash 0.3s ease-out;
        }
        @keyframes cellReveal {
            0% {
                transform: scale(0.7);
                opacity: 0.3;
            }
            60% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes explodeCell {
            0% {
                transform: scale(1);
                background: #ff4757;
            }
            40% {
                transform: scale(1.35);
                background: #ff6b81;
            }
            100% {
                transform: scale(1);
                background: #ff4757;
            }
        }
        @keyframes flagPlant {
            0% {
                transform: scale(0.5) rotate(-20deg);
            }
            60% {
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }
        @keyframes chordFlash {
            0% {
                box-shadow: 0 0 0 rgba(78, 205, 196, 0.8);
            }
            100% {
                box-shadow: 0 0 20px rgba(78, 205, 196, 0);
            }
        }

        /* 数字颜色 */
        .cell .num-1 {
            color: #5b9ef5;
        }
        .cell .num-2 {
            color: #4ecdc4;
        }
        .cell .num-3 {
            color: #ff6b6b;
        }
        .cell .num-4 {
            color: #7c6ff7;
        }
        .cell .num-5 {
            color: #ff8c42;
        }
        .cell .num-6 {
            color: #3dd6d0;
        }
        .cell .num-7 {
            color: #e0e0e0;
        }
        .cell .num-8 {
            color: #b0b0b0;
        }

        /* 底部控制 */
        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .toggle-btn {
            padding: 7px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 500;
            transition: all 0.25s;
            font-family: inherit;
            white-space: nowrap;
        }
        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .toggle-btn.active-mode {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 3px 12px rgba(255, 107, 107, 0.35);
            animation: pulseMode 2s ease-in-out infinite;
        }
        @keyframes pulseMode {
            0%,
            100% {
                box-shadow: 0 3px 12px rgba(255, 107, 107, 0.35);
            }
            50% {
                box-shadow: 0 3px 20px rgba(255, 107, 107, 0.6);
            }
        }
        .best-time {
            font-size: 0.78em;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            text-align: center;
            min-height: 1.2em;
        }
        .best-time span {
            color: var(--gold);
            font-weight: 600;
        }

        /* 粒子层 */
        .particles-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: visible;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particleBurst 0.8s ease-out forwards;
        }
        @keyframes particleBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }
        .confetti {
            position: absolute;
            pointer-events: none;
            animation: confettiFall 1.5s ease-out forwards;
            border-radius: 3px;
        }
        @keyframes confettiFall {
            0% {
                transform: translate(0, -30px) rotate(0deg) scale(1);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--cdx), var(--cdy)) rotate(var(--rot)) scale(0.3);
                opacity: 0;
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            :root {
                --cell-size: 32px;
                --gap: 1.5px;
                --border-radius: 4px;
            }
            .game-wrapper {
                padding: 16px 10px 14px;
                border-radius: 14px;
                gap: 10px;
            }
            .game-title {
                font-size: 1.3em;
            }
            .diff-btn {
                padding: 6px 11px;
                font-size: 0.76em;
                border-radius: 20px;
            }
            .status-display {
                font-size: 1.1em;
                padding: 6px 10px;
                min-width: 42px;
            }
            .face-btn {
                font-size: 1.6em;
            }
            .cell {
                font-size: 0.8em;
            }
            .status-bar {
                gap: 10px;
            }
            .grid-container {
                padding: 4px;
                border-radius: 8px;
            }
            .toggle-btn {
                padding: 6px 12px;
                font-size: 0.74em;
            }
        }
        @media (max-width: 380px) {
            :root {
                --cell-size: 26px;
                --gap: 1px;
                --border-radius: 3px;
            }
            .cell {
                font-size: 0.7em;
                font-weight: 600;
            }
            .diff-btn {
                padding: 5px 9px;
                font-size: 0.7em;
                letter-spacing: 0.01em;
            }
            .status-display {
                font-size: 0.95em;
                padding: 5px 8px;
                letter-spacing: 0.03em;
            }
            .face-btn {
                font-size: 1.4em;
                padding: 2px 6px;
            }
            .game-wrapper {
                padding: 10px 6px 8px;
                gap: 7px;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- 游戏主体 -->
    <div class="game-wrapper" id="gameWrapper">
        <h1 class="game-title">💎 升级版扫雷</h1>

        <!-- 难度选择 -->
        <div class="difficulty-selector" id="difficultySelector">
            <button class="diff-btn active" data-diff="easy">🌟 初级 9×9</button>
            <button class="diff-btn" data-diff="medium">⚡ 中级 16×16</button>
            <button class="diff-btn" data-diff="hard">🔥 高级 30×16</button>
            <button class="diff-btn" data-diff="custom">🎯 自定义</button>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-display" id="mineCounter">010</div>
            <button class="face-btn" id="faceBtn" title="重新开始">😊</button>
            <div class="status-display timer" id="timerDisplay">000</div>
        </div>

        <!-- 游戏网格 -->
        <div class="grid-container" id="gridContainer">
            <div class="game-grid" id="gameGrid"></div>
            <div class="particles-layer" id="particlesLayer"></div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls-row">
            <button class="toggle-btn active-mode" id="modeToggle" title="切换挖掘/旗帜模式（移动端）">
                ⛏️ 挖掘模式
            </button>
            <button class="toggle-btn" id="soundToggle" title="音效开关">
                🔊 音效开启
            </button>
        </div>
        <div class="best-time" id="bestTimeDisplay"></div>
    </div>

    <!-- 自定义难度弹窗 -->
    <div id="customModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;">
        <div style="background:#1e2338;padding:24px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.6);text-align:center;color:#e0e0e0;min-width:280px;">
            <h3 style="margin:0 0 16px;color:#f0c060;">🎯 自定义难度</h3>
            <div style="margin:8px 0;"><label>宽度 (5-40)：</label><input type="number" id="customCols" min="5" max="40" value="16" style="width:60px;margin-left:8px;padding:4px;border-radius:6px;border:1px solid #555;background:#0d1117;color:#fff;text-align:center;"></div>
            <div style="margin:8px 0;"><label>高度 (5-24)：</label><input type="number" id="customRows" min="5" max="24" value="16" style="width:60px;margin-left:8px;padding:4px;border-radius:6px;border:1px solid #555;background:#0d1117;color:#fff;text-align:center;"></div>
            <div style="margin:8px 0;"><label>雷数 (1-*)：</label><input type="number" id="customMines" min="1" max="999" value="40" style="width:60px;margin-left:8px;padding:4px;border-radius:6px;border:1px solid #555;background:#0d1117;color:#fff;text-align:center;"></div>
            <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">
                <button id="customConfirm" style="padding:8px 20px;border-radius:20px;border:none;background:#4ecdc4;color:#0f0c29;font-weight:700;cursor:pointer;">确认</button>
                <button id="customCancel" style="padding:8px 20px;border-radius:20px;border:1px solid #555;background:transparent;color:#ccc;cursor:pointer;">取消</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 音效引擎 ====================
            class SoundEngine {
                constructor() {
                    this.enabled = true;
                    this.ctx = null;
                }
                init() {
                    if (!this.ctx) {
                        try {
                            this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                        } catch (e) {
                            this.enabled = false;
                        }
                    }
                    if (this.ctx && this.ctx.state === 'suspended') {
                        this.ctx.resume();
                    }
                }
                play(freq, type, duration, vol = 0.08, freq2 = null, glideTime = 0) {
                    if (!this.enabled || !this.ctx) return;
                    this.init();
                    const now = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, now);
                    if (freq2 && glideTime > 0) {
                        osc.frequency.linearRampToValueAtTime(freq2, now + glideTime);
                    }
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now);
                    osc.stop(now + duration);
                }
                clickSound() { this.play(800, 'sine', 0.08, 0.06);
                    this.play(1200, 'sine', 0.06, 0.03, null, 0); }
                flagSound() { this.play(600, 'triangle', 0.1, 0.05);
                    setTimeout(() => this.play(900, 'triangle', 0.08, 0.04), 60); }
                chordSound() { this.play(300, 'sine', 0.12, 0.05);
                    this.play(500, 'sine', 0.1, 0.04, 700, 0.04); }
                explodeSound() {
                    this.play(40, 'sawtooth', 0.35, 0.18, 15, 0.3);
                    setTimeout(() => this.play(25, 'square', 0.3, 0.15, 10, 0.25), 80);
                }
                victorySound() {
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((f, i) => setTimeout(() => this.play(f, 'sine', 0.2, 0.07), i * 100));
                }
                toggle() { this.enabled = !this.enabled; return this.enabled; }
            }
            const sound = new SoundEngine();

            // ==================== 星空背景 ====================
            function createStars() {
                const container = document.getElementById('starsContainer');
                container.innerHTML = '';
                const count = Math.floor(window.innerWidth * window.innerHeight / 3000);
                for (let i = 0; i < Math.min(count, 150); i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = star.style.height = (Math.random() * 2.5 + 1) + 'px';
                    star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                    star.style.setProperty('--delay', (Math.random() * 4) + 's');
                    container.appendChild(star);
                }
            }
            createStars();
            window.addEventListener('resize', createStars);

            // ==================== 游戏状态 ====================
            const DIFFICULTIES = {
                easy: { rows: 9, cols: 9, mines: 10, label: '初级' },
                medium: { rows: 16, cols: 16, mines: 40, label: '中级' },
                hard: { rows: 16, cols: 30, mines: 99, label: '高级' },
            };

            let currentDifficulty = 'easy';
            let config = { ...DIFFICULTIES.easy };
            let grid = []; // grid[r][c] = { mine, revealed, flagged, questionMark, adjacentMines }
            let gameState = 'idle'; // 'idle' | 'playing' | 'won' | 'lost'
            let timerInterval = null;
            let elapsedSeconds = 0;
            let firstClickDone = false;
            let flagMode = false; // true=旗帜模式, false=挖掘模式
            let minePositions = [];
            let revealedCount = 0;
            let totalSafeCells = 0;

            // DOM引用
            const gameGrid = document.getElementById('gameGrid');
            const mineCounter = document.getElementById('mineCounter');
            const timerDisplay = document.getElementById('timerDisplay');
            const faceBtn = document.getElementById('faceBtn');
            const modeToggle = document.getElementById('modeToggle');
            const soundToggle = document.getElementById('soundToggle');
            const bestTimeDisplay = document.getElementById('bestTimeDisplay');
            const gameWrapper = document.getElementById('gameWrapper');
            const particlesLayer = document.getElementById('particlesLayer');
            const gridContainer = document.getElementById('gridContainer');
            const customModal = document.getElementById('customModal');

            // ==================== 初始化游戏 ====================
            function initGame() {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedSeconds = 0;
                firstClickDone = false;
                gameState = 'idle';
                revealedCount = 0;
                minePositions = [];
                totalSafeCells = config.rows * config.cols - config.mines;
                grid = [];
                for (let r = 0; r < config.rows; r++) {
                    grid[r] = [];
                    for (let c = 0; c < config.cols; c++) {
                        grid[r][c] = {
                            mine: false,
                            revealed: false,
                            flagged: false,
                            questionMark: false,
                            adjacentMines: 0,
                        };
                    }
                }
                updateMineCounter();
                updateTimerDisplay();
                faceBtn.textContent = '😊';
                gameWrapper.classList.remove('victory-glow', 'defeat-glow');
                particlesLayer.innerHTML = '';
                renderGrid();
                updateBestTimeDisplay();
            }

            function placeMines(excludeR, excludeC) {
                // 在排除区域外放置地雷
                const excludeSet = new Set();
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = excludeR + dr;
                        const nc = excludeC + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                            excludeSet.add(nr * config.cols + nc);
                        }
                    }
                }
                const candidates = [];
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        if (!excludeSet.has(r * config.cols + c)) {
                            candidates.push({ r, c });
                        }
                    }
                }
                // 如果候选不够，放宽限制
                let pool = candidates;
                if (candidates.length < config.mines) {
                    pool = [];
                    for (let r = 0; r < config.rows; r++) {
                        for (let c = 0; c < config.cols; c++) {
                            if (!(r === excludeR && c === excludeC)) {
                                pool.push({ r, c });
                            }
                        }
                    }
                }
                // Fisher-Yates 洗牌并取前mines个
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                const selected = pool.slice(0, config.mines);
                minePositions = selected;
                selected.forEach(({ r, c }) => {
                    grid[r][c].mine = true;
                });
                // 计算相邻雷数
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        if (!grid[r][c].mine) {
                            grid[r][c].adjacentMines = countAdjacentMines(r, c);
                        }
                    }
                }
            }

            function countAdjacentMines(r, c) {
                let count = 0;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && grid[nr][nc].mine) {
                            count++;
                        }
                    }
                }
                return count;
            }

            // ==================== 渲染 ====================
            function renderGrid() {
                gameGrid.innerHTML = '';
                gameGrid.style.gridTemplateColumns = `repeat(${config.cols}, var(--cell-size))`;
                gameGrid.style.gridTemplateRows = `repeat(${config.rows}, var(--cell-size))`;
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        const cell = document.createElement('button');
                        cell.className = 'cell unrevealed';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.setAttribute('aria-label', `格子 ${r+1},${c+1}`);
                        // 事件绑定
                        cell.addEventListener('click', (e) => handleCellClick(r, c, e));
                        cell.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            handleRightClick(r, c);
                        });
                        cell.addEventListener('mousedown', (e) => {
                            if (e.button === 1) {
                                e.preventDefault();
                                handleChord(r, c);
                            }
                        });
                        cell.addEventListener('dblclick', (e) => {
                            handleChord(r, c);
                        });
                        // 移动端长按
                        let longPressTimer = null;
                        cell.addEventListener('touchstart', (e) => {
                            longPressTimer = setTimeout(() => {
                                handleRightClick(r, c);
                                if (navigator.vibrate) navigator.vibrate(15);
                                longPressTimer = null;
                            }, 400);
                        });
                        cell.addEventListener('touchend', () => {
                            if (longPressTimer) {
                                clearTimeout(longPressTimer);
                                longPressTimer = null;
                            }
                        });
                        cell.addEventListener('touchmove', () => {
                            if (longPressTimer) {
                                clearTimeout(longPressTimer);
                                longPressTimer = null;
                            }
                        });
                        gameGrid.appendChild(cell);
                    }
                }
                updateAllCellVisuals();
            }

            function updateAllCellVisuals() {
                const cells = gameGrid.querySelectorAll('.cell');
                cells.forEach(cell => {
                    const r = parseInt(cell.dataset.row);
                    const c = parseInt(cell.dataset.col);
                    const data = grid[r][c];
                    cell.className = 'cell';
                    cell.textContent = '';
                    cell.innerHTML = '';

                    if (data.revealed) {
                        cell.classList.add('revealed');
                        if (data.mine) {
                            cell.textContent = '💣';
                            cell.style.fontSize = '1.2em';
                        } else if (data.adjacentMines > 0) {
                            const span = document.createElement('span');
                            span.className = `num-${data.adjacentMines}`;
                            span.textContent = data.adjacentMines;
                            cell.appendChild(span);
                        }
                    } else {
                        cell.classList.add('unrevealed');
                        if (data.flagged) {
                            cell.textContent = '🚩';
                            cell.classList.add('flagged');
                        } else if (data.questionMark) {
                            cell.textContent = '❓';
                            cell.style.fontSize = '0.85em';
                        }
                    }

                    // 如果是失败状态，显示所有雷
                    if (gameState === 'lost' && data.mine && !data.revealed && !data.flagged) {
                        cell.classList.add('revealed');
                        cell.textContent = '💣';
                        cell.style.opacity = '0.7';
                    }
                    // 错误标记显示
                    if (gameState === 'lost' && data.flagged && !data.mine) {
                        cell.textContent = '❌';
                        cell.style.opacity = '0.8';
                    }
                });
            }

            function updateCellVisual(r, c) {
                const cell = gameGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if (!cell) return;
                const data = grid[r][c];
                cell.className = 'cell';
                cell.textContent = '';
                cell.innerHTML = '';
                cell.style.opacity = '';
                cell.style.fontSize = '';

                if (data.revealed) {
                    cell.classList.add('revealed');
                    if (data.mine) {
                        cell.textContent = '💣';
                        cell.style.fontSize = '1.2em';
                    } else if (data.adjacentMines > 0) {
                        const span = document.createElement('span');
                        span.className = `num-${data.adjacentMines}`;
                        span.textContent = data.adjacentMines;
                        cell.appendChild(span);
                    }
                } else {
                    cell.classList.add('unrevealed');
                    if (data.flagged) {
                        cell.textContent = '🚩';
                        cell.classList.add('flagged');
                    } else if (data.questionMark) {
                        cell.textContent = '❓';
                        cell.style.fontSize = '0.85em';
                    }
                }
            }

            // ==================== 交互逻辑 ====================
            function handleCellClick(r, c, event) {
                if (gameState === 'won' || gameState === 'lost') return;
                if (flagMode) {
                    handleRightClick(r, c);
                    return;
                }
                const data = grid[r][c];
                if (data.revealed) {
                    // Chord功能：点击已揭开的数字
                    if (data.adjacentMines > 0 && !data.mine) {
                        handleChord(r, c);
                    }
                    return;
                }
                if (data.flagged || data.questionMark) return;

                // 首次点击
                if (!firstClickDone) {
                    firstClickDone = true;
                    placeMines(r, c);
                    gameState = 'playing';
                    startTimer();
                    faceBtn.textContent = '😊';
                }
                if (gameState !== 'playing') return;

                revealCell(r, c);
            }

            function handleRightClick(r, c) {
                if (gameState === 'won' || gameState === 'lost') return;
                const data = grid[r][c];
                if (data.revealed) return;

                // 如果还没开始，右键不算首次点击，但允许标记
                if (!firstClickDone && !data.flagged && !data.questionMark) {
                    // 允许在游戏开始前标记，但不开始计时
                }

                // 循环：无标记 → 旗帜 → 问号 → 无标记
                if (!data.flagged && !data.questionMark) {
                    data.flagged = true;
                    data.questionMark = false;
                    sound.flagSound();
                } else if (data.flagged) {
                    data.flagged = false;
                    data.questionMark = true;
                    sound.clickSound();
                } else {
                    data.questionMark = false;
                    sound.clickSound();
                }
                updateCellVisual(r, c);
                updateMineCounter();
                checkWinCondition();
            }

            function handleChord(r, c) {
                if (gameState !== 'playing') return;
                const data = grid[r][c];
                if (!data.revealed || data.mine || data.adjacentMines === 0) return;
                // 计算周围旗帜数量
                let flagCount = 0;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && grid[nr][nc].flagged) {
                            flagCount++;
                        }
                    }
                }
                if (flagCount === data.adjacentMines) {
                    sound.chordSound();
                    // 给这个格子一个视觉反馈
                    const cell = gameGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    if (cell) {
                        cell.classList.add('chord-flash');
                        setTimeout(() => cell.classList.remove('chord-flash'), 300);
                    }
                    // 揭开周围未标记的格子
                    let hitMine = false;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                                const nd = grid[nr][nc];
                                if (!nd.revealed && !nd.flagged) {
                                    if (nd.mine) {
                                        hitMine = true;
                                        nd.revealed = true;
                                    } else {
                                        revealCell(nr, nc, true);
                                    }
                                }
                            }
                        }
                    }
                    if (hitMine) {
                        triggerLoss(r, c);
                    }
                }
            }

            function revealCell(r, c, fromChord = false) {
                const data = grid[r][c];
                if (data.revealed || data.flagged || data.questionMark) return;
                if (gameState !== 'playing') return;

                data.revealed = true;
                revealedCount++;
                updateCellVisual(r, c);

                if (data.mine) {
                    triggerLoss(r, c);
                    return;
                }

                if (!fromChord) {
                    sound.clickSound();
                }

                // 如果是空格（无相邻雷），递归揭开
                if (data.adjacentMines === 0) {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                                revealCell(nr, nc, fromChord);
                            }
                        }
                    }
                }

                checkWinCondition();
            }

            function triggerLoss(clickedR, clickedC) {
                gameState = 'lost';
                clearInterval(timerInterval);
                timerInterval = null;
                faceBtn.textContent = '😵';
                gameWrapper.classList.add('defeat-glow');
                sound.explodeSound();
                if (navigator.vibrate) navigator.vibrate([50, 80, 50]);

                // 标记点击的雷
                const clickedCell = gameGrid.querySelector(`[data-row="${clickedR}"][data-col="${clickedC}"]`);
                if (clickedCell && grid[clickedR][clickedC].mine) {
                    clickedCell.classList.add('mine-exploded');
                }

                // 显示所有雷
                updateAllCellVisuals();

                // 粒子爆炸效果
                spawnExplosionParticles(clickedR, clickedC);
                // 给所有雷添加小延迟的爆炸粒子
                minePositions.forEach((pos, i) => {
                    if (pos.r !== clickedR || pos.c !== clickedC) {
                        setTimeout(() => spawnSmallParticle(pos.r, pos.c), 100 + i * 30);
                    }
                });
            }

            function checkWinCondition() {
                if (gameState !== 'playing') return;
                if (revealedCount >= totalSafeCells) {
                    gameState = 'won';
                    clearInterval(timerInterval);
                    timerInterval = null;
                    faceBtn.textContent = '😎';
                    gameWrapper.classList.add('victory-glow');
                    sound.victorySound();
                    if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 60]);
                    // 自动标记所有雷
                    minePositions.forEach(pos => {
                        if (!grid[pos.r][pos.c].flagged) {
                            grid[pos.r][pos.c].flagged = true;
                            grid[pos.r][pos.c].questionMark = false;
                        }
                    });
                    updateAllCellVisuals();
                    updateMineCounter();
                    // 胜利烟花
                    spawnVictoryConfetti();
                    // 保存最佳成绩
                    saveBestTime();
                    updateBestTimeDisplay();
                }
            }

            // ==================== 粒子效果 ====================
            function spawnExplosionParticles(r, c) {
                const cellEl = gameGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if (!cellEl) return;
                const gridRect = gridContainer.getBoundingClientRect();
                const cellRect = cellEl.getBoundingClientRect();
                const cx = cellRect.left - gridRect.left + cellRect.width / 2;
                const cy = cellRect.top - gridRect.top + cellRect.height / 2;
                const colors = ['#ff4757', '#ff6b81', '#ffa502', '#ff6348', '#ff3838', '#fff176', '#ff8a65'];

                for (let i = 0; i < 30; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 30 + Math.random() * 80;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    particle.style.left = cx + 'px';
                    particle.style.top = cy + 'px';
                    particle.style.width = (4 + Math.random() * 8) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.setProperty('--dx', dx + 'px');
                    particle.style.setProperty('--dy', dy + 'px');
                    particle.style.animationDuration = (0.5 + Math.random() * 0.8) + 's';
                    particlesLayer.appendChild(particle);
                    setTimeout(() => particle.remove(), 1000);
                }
            }

            function spawnSmallParticle(r, c) {
                const cellEl = gameGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                if (!cellEl) return;
                const gridRect = gridContainer.getBoundingClientRect();
                const cellRect = cellEl.getBoundingClientRect();
                const cx = cellRect.left - gridRect.left + cellRect.width / 2;
                const cy = cellRect.top - gridRect.top + cellRect.height / 2;
                for (let i = 0; i < 6; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 15 + Math.random() * 35;
                    particle.style.left = cx + 'px';
                    particle.style.top = cy + 'px';
                    particle.style.width = (3 + Math.random() * 5) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.background = '#ff6b81';
                    particle.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                    particle.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                    particle.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';
                    particlesLayer.appendChild(particle);
                    setTimeout(() => particle.remove(), 700);
                }
            }

            function spawnVictoryConfetti() {
                const gridRect = gridContainer.getBoundingClientRect();
                const colors = ['#f0c060', '#ff6b6b', '#4ecdc4', '#7c6ff7', '#ff8c42', '#2ed573',
                    '#ff9a56', '#5b9ef5', '#ff6b81', '#3dd6d0', '#fff176', '#ff80ab'
                ];
                for (let i = 0; i < 70; i++) {
                    setTimeout(() => {
                        const confetti = document.createElement('div');
                        confetti.className = 'confetti';
                        const startX = Math.random() * gridRect.width;
                        const startY = -10 - Math.random() * 40;
                        confetti.style.left = startX + 'px';
                        confetti.style.top = startY + 'px';
                        confetti.style.width = (5 + Math.random() * 10) + 'px';
                        confetti.style.height = (5 + Math.random() * 10) + 'px';
                        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                        confetti.style.setProperty('--cdx', (Math.random() - 0.5) * 200 + 'px');
                        confetti.style.setProperty('--cdy', (gridRect.height + 60 + Math.random() * 100) + 'px');
                        confetti.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
                        confetti.style.animationDuration = (1.2 + Math.random() * 1.8) + 's';
                        particlesLayer.appendChild(confetti);
                        setTimeout(() => confetti.remove(), 2000);
                    }, i * 25);
                }
            }

            // ==================== 计时器 ====================
            function startTimer() {
                if (timerInterval) return;
                elapsedSeconds = 0;
                updateTimerDisplay();
                timerInterval = setInterval(() => {
                    elapsedSeconds++;
                    if (elapsedSeconds > 999) elapsedSeconds = 999;
                    updateTimerDisplay();
                }, 1000);
            }

            function updateTimerDisplay() {
                timerDisplay.textContent = String(elapsedSeconds).padStart(3, '0');
            }

            function updateMineCounter() {
                let flaggedCount = 0;
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        if (grid[r][c].flagged) flaggedCount++;
                    }
                }
                const remaining = config.mines - flaggedCount;
                mineCounter.textContent = (remaining >= 0 ? String(remaining).padStart(3, '0') : '-' + String(Math.abs(
                    remaining)).padStart(2, '0'));
                if (remaining < 0) mineCounter.style.color = '#ffa502';
                else mineCounter.style.color = '#ff6b6b';
            }

            // ==================== 最佳成绩 ====================
            function getBestTimeKey() {
                return `minesweeper_best_${currentDifficulty}_${config.rows}x${config.cols}x${config.mines}`;
            }
            function saveBestTime() {
                const key = getBestTimeKey();
                const existing = localStorage.getItem(key);
                if (existing === null || elapsedSeconds < parseInt(existing)) {
                    localStorage.setItem(key, elapsedSeconds);
                }
            }
            function getBestTime() {
                const key = getBestTimeKey();
                return localStorage.getItem(key);
            }
            function updateBestTimeDisplay() {
                const best = getBestTime();
                if (best !== null && parseInt(best) > 0) {
                    bestTimeDisplay.innerHTML = `🏆 最佳成绩：<span>${best}秒</span>`;
                } else {
                    bestTimeDisplay.innerHTML = '';
                }
            }

            // ==================== 模式切换 ====================
            function setFlagMode(enabled) {
                flagMode = enabled;
                if (flagMode) {
                    modeToggle.textContent = '🚩 旗帜模式';
                    modeToggle.classList.add('active-mode');
                } else {
                    modeToggle.textContent = '⛏️ 挖掘模式';
                    modeToggle.classList.remove('active-mode');
                }
            }

            // ==================== 事件监听 ====================
            faceBtn.addEventListener('click', () => {
                faceBtn.classList.add('pressed');
                setTimeout(() => faceBtn.classList.remove('pressed'), 300);
                initGame();
                sound.clickSound();
            });

            modeToggle.addEventListener('click', () => {
                setFlagMode(!flagMode);
                sound.clickSound();
            });

            soundToggle.addEventListener('click', () => {
                const enabled = sound.toggle();
                soundToggle.textContent = enabled ? '🔊 音效开启' : '🔇 音效关闭';
            });

            // 难度选择
            document.getElementById('difficultySelector').addEventListener('click', (e) => {
                const btn = e.target.closest('.diff-btn');
                if (!btn) return;
                const diff = btn.dataset.diff;
                if (diff === 'custom') {
                    showCustomModal();
                    return;
                }
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = diff;
                config = { ...DIFFICULTIES[diff] };
                initGame();
                sound.clickSound();
            });

            // 自定义难度弹窗
            function showCustomModal() {
                customModal.style.display = 'flex';
                document.getElementById('customCols').value = config.cols;
                document.getElementById('customRows').value = config.rows;
                document.getElementById('customMines').value = config.mines;
            }
            document.getElementById('customConfirm').addEventListener('click', () => {
                const cols = Math.max(5, Math.min(40, parseInt(document.getElementById('customCols')
                    .value) || 16));
                const rows = Math.max(5, Math.min(24, parseInt(document.getElementById('customRows')
                    .value) || 16));
                const maxMines = cols * rows - 9;
                const mines = Math.max(1, Math.min(maxMines, parseInt(document.getElementById('customMines')
                    .value) || 10));
                config = { rows, cols, mines, label: '自定义' };
                currentDifficulty = 'custom';
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                const customBtn = document.querySelector('[data-diff="custom"]');
                if (customBtn) customBtn.classList.add('active');
                customModal.style.display = 'none';
                initGame();
                sound.clickSound();
            });
            document.getElementById('customCancel').addEventListener('click', () => {
                customModal.style.display = 'none';
                // 恢复到之前的难度
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                const prevBtn = document.querySelector(`[data-diff="${currentDifficulty}"]`);
                if (prevBtn) prevBtn.classList.add('active');
            });
            customModal.addEventListener('click', (e) => {
                if (e.target === customModal) customModal.style.display = 'none';
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'f' || e.key === 'F') {
                    setFlagMode(!flagMode);
                }
                if (e.key === 'r' || e.key === 'R') {
                    if (!e.ctrlKey && !e.metaKey) {
                        initGame();
                        sound.clickSound();
                    }
                }
                if (e.key === 'm' || e.key === 'M') {
                    const enabled = sound.toggle();
                    soundToggle.textContent = enabled ? '🔊 音效开启' : '🔇 音效关闭';
                }
            });

            // 窗口大小变化时更新星空
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(createStars, 300);
            });

            // ==================== 启动 ====================
            initGame();
            setFlagMode(false);
            updateBestTimeDisplay();
            sound.init();

            console.log('💎 升级版扫雷已就绪！');
            console.log('   🖱️ 左键点击 = 揭开 | 右键 = 标记旗帜');
